<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNR - Suivi Plants</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; background: #f4f4f4; }
    h1 { color: #0066cc; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #0066cc; color: white; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    .admin { text-align: center; margin: 15px 0; }
  </style>
</head>
<body>
  <h1>🌱 CNR - Suivi Production et Plantation</h1>

  <div class="admin">
    <input type="password" id="adminPass" placeholder="Mot de passe Admin" style="width:200px;">
    <button onclick="activateAdmin()">Activer Édition</button>
  </div>

  <h2>Synthèse Globale Mono-Couffo</h2>
  <table id="dataTable">
    <tr>
      <th>Commune</th>
      <th>Pépinières Écoles</th>
      <th>Pépinières Privées</th>
      <th>Production Totale</th>
      <th>Plants Enlevés</th>
    </tr>
  </table>

  <script>
    const ADMIN_PASSWORD = "Corneille@12";
    let isAdmin = false;
    let data = JSON.parse(localStorage.getItem('cnrPlantData')) || {};

    const communes = ["Aplahoué","Athiémé","Lokossa","Bopa","Comé","Grand-Popo","Houéyogbé","Djakotomè","Dogbo","Klouékanmè","Lalo","Toviklin"];

    const table = document.getElementById('dataTable');

    // Create table rows
    communes.forEach(comm => {
      const row = table.insertRow();
      row.innerHTML = `
        <td>${comm}</td>
        <td><input type="number" value="${data[comm]?.ecoles || 0}" onchange="saveData()"></td>
        <td><input type="number" value="${data[comm]?.privees || 0}" onchange="saveData()"></td>
        <td class="total">${(data[comm]?.ecoles || 0) + (data[comm]?.privees || 0)}</td>
        <td><input type="number" value="${data[comm]?.enleves || 0}" onchange="saveData()"></td>
      `;
    });

    function activateAdmin() {
      if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
        isAdmin = true;
        alert("✅ Mode Administrateur activé. Les utilisateurs peuvent maintenant modifier.");
      } else {
        alert("❌ Mot de passe incorrect");
      }
    }

    function saveData() {
      if (!isAdmin) return;
      data = {};
      const rows = table.rows;
      for (let i = 1; i < rows.length; i++) {
        const comm = rows[i].cells[0].textContent;
        data[comm] = {
          ecoles: parseFloat(rows[i].cells[1].querySelector('input').value) || 0,
          privees: parseFloat(rows[i].cells[2].querySelector('input').value) || 0,
          enleves: parseFloat(rows[i].cells[4].querySelector('input').value) || 0
        };
      }
      localStorage.setItem('cnrPlantData', JSON.stringify(data));
    }
  </script>
</body>
</html>
