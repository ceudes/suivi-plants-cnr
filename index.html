<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNR - Suivi Plants Mono-Couffo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; background: #f4f4f4; }
    h1 { color: #0066cc; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #0066cc; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .total { font-weight: bold; color: green; }
    input { padding: 10px; width: 100%; margin: 10px 0; font-size: 16px; }
  </style>
</head>
<body>
  <h1>🌱 CNR - Suivi Production et Plantation des Plants</h1>
  <p style="text-align:center;">(Mono & Couffo)</p>

  <div>
    <input type="password" id="pass" placeholder="Mot de passe admin pour modifier" onkeyup="if(event.key==='Enter') checkPass()">
    <button onclick="checkPass()">Activer Mode Modification</button>
  </div>

  <h2>Synthèse Globale Mono-Couffo</h2>
  <table id="mainTable">
    <tr>
      <th>Commune</th>
      <th>Pépinières Écoles</th>
      <th>Pépinières Privées</th>
      <th>Production Totale</th>
      <th>Plants Enlevés</th>
    </tr>
  </table>

  <script>
    const adminPassword = "Corneille@12";

    function checkPass() {
      if (document.getElementById('pass').value === adminPassword) {
        alert("✅ Mode Administrateur activé ! Tu peux maintenant modifier les cellules.");
        enableEditing();
      } else {
        alert("❌ Mot de passe incorrect");
      }
    }

    function enableEditing() {
      const cells = document.querySelectorAll('#mainTable td');
      cells.forEach(cell => {
        cell.contentEditable = true;
        cell.onkeyup = updateTotals;
      });
    }

    function updateTotals() {
      // Simple total update logic
      console.log("Totaux mis à jour");
    }

    // Add sample rows
    const communes = ["Aplahoué","Athiémé","Lokossa","Bopa","Comé","Grand-Popo","Houéyogbé","Djakotomè","Dogbo","Klouékanmè","Lalo","Toviklin"];
    const table = document.getElementById('mainTable');
    communes.forEach(comm => {
      const row = table.insertRow();
      row.innerHTML = `
        <td>${comm}</td>
        <td contenteditable="false">0</td>
        <td contenteditable="false">0</td>
        <td class="total">0</td>
        <td contenteditable="false">0</td>
      `;
    });
  </script>
</body>
</html>
